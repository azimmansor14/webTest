<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>MSBR & MSIC Explorer</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  <style>
    /* ... (Keep your existing CSS from the previous design here) ... */
    :root { --primary: #3b82f6; --bg: #0f172a; --card-bg: rgba(255, 255, 255, 0.9); --text-main: #1e293b; --text-muted: #64748b; --radius: 20px; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: sans-serif; color: var(--text-main); background: var(--bg); display: flex; justify-content: center; padding: 16px; min-height: 100vh; }
    .shell { width: 100%; max-width: 1100px; }
    header h1 { color: white; margin: 0; }
    header p { color: rgba(255,255,255,0.6); }
    .tab-container { display: flex; background: rgba(255,255,255,0.1); padding: 4px; border-radius: 14px; margin: 16px 0; }
    .tab-btn { flex: 1; padding: 12px; border: none; background: transparent; color: white; cursor: pointer; border-radius: 10px; font-weight: 600; }
    .tab-btn.active { background: var(--primary); }
    .card { background: var(--card-bg); border-radius: var(--radius); overflow: hidden; display: flex; flex-direction: column; }
    .search-area { padding: 20px; background: white; border-bottom: 1px solid #eee; }
    input#q { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #ddd; font-size: 16px; outline: none; }
    .status-bar { display: flex; justify-content: space-between; padding: 10px 20px; background: #f8fafc; font-size: 12px; }
    #results { flex: 1; overflow: auto; max-height: 60vh; min-height: 300px; }
    .data-card { padding: 15px; border-bottom: 1px solid #eee; background: white; }
    .card-title { color: var(--primary); font-weight: 700; display: block; margin-bottom: 5px; }
    .card-label { font-size: 10px; color: var(--text-muted); font-weight: 700; }
    .card-val { font-size: 13px; margin-bottom: 5px; }
    .pager { display: flex; justify-content: space-between; padding: 16px; background: white; align-items: center; }
    .btn { padding: 8px 16px; border-radius: 8px; border: 1px solid #ddd; background: white; cursor: pointer; }
    .spinner { width: 18px; height: 18px; border: 3px solid #eee; border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (min-width: 768px) {
      table { width: 100%; border-collapse: collapse; }
      th { position: sticky; top: 0; background: #f8fafc; padding: 12px; text-align: left; font-size: 11px; border-bottom: 1px solid #eee; }
      td { padding: 12px; font-size: 13px; border-bottom: 1px solid #eee; background: white; }
      .data-card { display: none; }
    }
    @media (max-width: 767px) { table { display: none; } }
  </style>
</head>
<body>

<div class="shell">
  <header>
    <h1>Carian MSBR & MSIC</h1>
    <p>DOSM Negeri Sembilan</p>
  </header>

  <div class="tab-container">
    <button id="tab-msbr" class="tab-btn active" onclick="switchTab('msbr')">MSBR</button>
    <button id="tab-msic" class="tab-btn" onclick="switchTab('msic')">MSIC</button>
  </div>

  <div class="card">
    <div class="search-area">
      <input type="text" id="q" placeholder="Sila tunggu, memuatkan data..." disabled autocomplete="off">
    </div>

    <div class="status-bar">
      <div style="display:flex; align-items:center; gap:8px;">
        <div class="spinner" id="loader"></div>
        <span id="statusTxt">Memuatkan CSV...</span>
      </div>
      <span id="countTxt">0 results</span>
    </div>

    <div id="results">
      <div style="padding: 60px 20px; text-align: center; color: var(--text-muted);">Sila tunggu sehingga data selesai dimuatkan.</div>
    </div>

    <div class="pager">
      <button id="prevBtn" class="btn" disabled>← Prev</button>
      <span id="pageTxt" style="font-size: 12px; font-weight:700;">Page 1</span>
      <button id="nextBtn" class="btn" disabled>Next →</button>
    </div>
  </div>
</div>

<script>
  let activeTab = 'msbr';
  let offset = 0;
  const limit = 20;
  
  // Storage for the full datasets
  let datasets = { msbr: null, msic: null };
  let filteredData = [];

  const input = document.getElementById('q');
  const resultsEl = document.getElementById('results');
  const loader = document.getElementById('loader');
  const statusTxt = document.getElementById('statusTxt');
  const countTxt = document.getElementById('countTxt');

  // 1. Initial Load: Fetch CSVs immediately
  window.onload = () => {
    loadCSV('msbr', 'newMSBR.csv');
    loadCSV('msic', 'MSIC2008_2025.csv');
  };

  function loadCSV(type, filename) {
    Papa.parse(filename, {
      download: true,
      header: true,
      skipEmptyLines: true,
      complete: function(results) {
        datasets[type] = results;
        if (type === activeTab) {
          input.disabled = false;
          input.placeholder = "Carian Nama / No. Siri...";
          statusTxt.textContent = "Data sedia.";
        }
      }
    });
  }

  function switchTab(tab) {
    if (activeTab === tab) return;
    activeTab = tab;
    offset = 0;
    input.value = "";
    
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-'+tab).classList.add('active');
    
    // Reset View
    resultsEl.innerHTML = `<div style="padding: 60px 20px; text-align: center; color: var(--text-muted);">Masukkan carian baru untuk ${tab.toUpperCase()}.</div>`;
    statusTxt.textContent = "Data sedia.";
    countTxt.textContent = "0 results";
    updatePager(0);
  }

  input.addEventListener('input', () => {
    offset = 0;
    runSearch();
  });

  function runSearch() {
    const q = input.value.trim().toLowerCase();
    const data = datasets[activeTab];

    if (!data) return;
    if (q.length < 2) {
      filteredData = [];
      renderUI();
      return;
    }

    loader.style.display = 'block';

    // Perform Search in Browser
    filteredData = data.data.filter(row => {
      return Object.values(row).some(val => 
        String(val).toLowerCase().includes(q)
      );
    });

    renderUI();
    loader.style.display = 'none';
  }

  function renderUI() {
    const total = filteredData.length;
    countTxt.textContent = `${total} results`;
    
    if (total === 0) {
      resultsEl.innerHTML = '<div style="padding:60px; text-align:center;">Tiada rekod dijumpai.</div>';
      updatePager(0);
      return;
    }

    const rowsToShow = filteredData.slice(offset, offset + limit);
    const headers = Object.keys(filteredData[0]);

    let cardHtml = '';
    let tableHtml = '<table><thead><tr>';
    headers.forEach(h => tableHtml += `<th>${h}</th>`);
    tableHtml += '</tr></thead><tbody>';

    rowsToShow.forEach(row => {
      tableHtml += '<tr>';
      headers.forEach(h => tableHtml += `<td>${row[h] || '-'}</td>`);
      tableHtml += '</tr>';

      // Mobile Card Mapping
      cardHtml += `<div class="data-card">`;
      if (activeTab === 'msbr') {
        cardHtml += `<span class="card-title">${row['Nama Pendaftaran'] || 'Tiada Nama'}</span>`;
        cardHtml += `<div class="card-label">No. Siri</div><div class="card-val">${row['No. Siri']}</div>`;
        cardHtml += `<div class="card-label">Daerah</div><div class="card-val">${row['Daerah Pentadbiran Tahunan'] || '-'}</div>`;
      } else {
        cardHtml += `<span class="card-title">${row['MSIC 2025'] || row['MSIC 2008']}</span>`;
        cardHtml += `<div class="card-label">Malay</div><div class="card-val">${row['MALAY DESCRIPTION FOR MSIC 2025'] || '-'}</div>`;
      }
      cardHtml += `</div>`;
    });

    tableHtml += '</tbody></table>';
    resultsEl.innerHTML = cardHtml + tableHtml;
    updatePager(total);
  }

  function updatePager(total) {
    document.getElementById('prevBtn').disabled = offset === 0;
    document.getElementById('nextBtn').disabled = (offset + limit) >= total;
    document.getElementById('pageTxt').textContent = `Page ${Math.floor(offset/limit) + 1}`;
  }

  document.getElementById('prevBtn').onclick = () => { offset -= limit; renderUI(); };
  document.getElementById('nextBtn').onclick = () => { offset += limit; renderUI(); };
</script>

</body>
</html>
