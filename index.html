<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Explorer MSBR & MSIC</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  <style>
    :root {
      --primary: #3b82f6;
      --bg: #0f172a;
      --card-bg: rgba(255, 255, 255, 0.95);
      --text-main: #1e293b;
      --text-muted: #64748b;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body {
      margin: 0;
      font-family: -apple-system, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text-main);
      display: flex; justify-content: center; min-height: 100vh;
    }

    .shell { width: 100%; max-width: 800px; padding: 12px; display: flex; flex-direction: column; }

    header h1 { color: white; font-size: 22px; margin: 10px 0 0; }
    header p { color: rgba(255,255,255,0.5); font-size: 13px; margin: 4px 0 15px; }

    /* --- Tabs (Sticky for Mobile) --- */
    .tab-container {
      display: flex; background: rgba(255, 255, 255, 0.1); padding: 4px; border-radius: 12px; margin-bottom: 12px;
    }
    .tab-btn {
      flex: 1; padding: 10px; border: none; background: transparent; color: white;
      font-weight: 600; font-size: 13px; border-radius: 8px; transition: 0.2s;
    }
    .tab-btn.active { background: var(--primary); box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3); }

    /* --- Search Area --- */
    .main-card {
      background: var(--card-bg); border-radius: 16px; display: flex; flex-direction: column;
      flex: 1; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    .search-box { padding: 15px; border-bottom: 1px solid #eee; background: white; }
    input#q {
      width: 100%; padding: 12px 15px; border-radius: 10px; border: 1px solid #ddd;
      font-size: 16px; outline: none; appearance: none;
    }

    .status-bar {
      display: flex; justify-content: space-between; padding: 8px 15px;
      background: #f8fafc; font-size: 11px; font-weight: 700; color: var(--text-muted);
    }

    /* --- Results (Scrollable Area) --- */
    #results { flex: 1; overflow-y: auto; background: #f1f5f9; }

    /* Mobile Card Layout */
    .data-item {
      background: white; margin: 8px; padding: 15px; border-radius: 12px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
    .item-title { color: var(--primary); font-weight: 800; font-size: 14px; margin-bottom: 8px; display: block; line-height: 1.3; }
    .item-row { display: flex; margin-bottom: 4px; font-size: 12px; }
    .item-label { width: 80px; color: var(--text-muted); font-weight: 600; flex-shrink: 0; }
    .item-val { color: var(--text-main); }

    /* --- Footer Pagination --- */
    .pager {
      padding: 12px; display: flex; justify-content: space-between; align-items: center;
      background: white; border-top: 1px solid #eee;
    }
    .btn { padding: 8px 16px; border-radius: 8px; border: 1px solid #ddd; background: white; font-size: 13px; font-weight: 600; }
    .btn:disabled { opacity: 0.3; }

    .loader-spin {
      width: 14px; height: 14px; border: 2px solid #ddd; border-top-color: var(--primary);
      border-radius: 50%; animation: spin 0.6s linear infinite; display: inline-block; margin-right: 5px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Desktop Adjustments */
    @media (min-width: 768px) {
      .shell { padding: 40px 20px; }
      .data-item { margin: 10px 20px; }
    }
  </style>
</head>
<body>

<div class="shell">
  <header>
    <h1>Carian MSBR & MSIC</h1>
    <p>DOSM Negeri Sembilan</p>
  </header>

  <div class="tab-container">
    <button id="btn-msbr" class="tab-btn active" onclick="switchTab('msbr')">MSBR</button>
    <button id="btn-msic" class="tab-btn" onclick="switchTab('msic')">MSIC</button>
  </div>

  <div class="main-card">
    <div class="search-box">
      <input type="text" id="q" placeholder="Memuatkan data..." disabled autocomplete="off">
    </div>

    <div class="status-bar">
      <span>
        <span id="loadIcon" class="loader-spin"></span>
        <span id="statusTxt">Loading CSV...</span>
      </span>
      <span id="countTxt">0 rekod</span>
    </div>

    <div id="results">
      <div style="padding:40px; text-align:center; color:var(--text-muted); font-size:14px;">
        Sila tunggu sebentar...
      </div>
    </div>

    <div class="pager">
      <button id="prevBtn" class="btn" disabled>Sebelum</button>
      <span id="pageTxt" style="font-size:12px; font-weight:700;">Halaman 1</span>
      <button id="nextBtn" class="btn" disabled>Seterusnya</button>
    </div>
  </div>
</div>

<script>
  let activeTab = 'msbr';
  let offset = 0;
  const limit = 20;
  let datasets = { msbr: null, msic: null };
  let filtered = [];

  const input = document.getElementById('q');
  const resultsEl = document.getElementById('results');
  const statusTxt = document.getElementById('statusTxt');
  const countTxt = document.getElementById('countTxt');
  const loadIcon = document.getElementById('loadIcon');

  // Load Data Files
  window.onload = () => {
    loadData('msbr', 'newMSBR.csv');
    loadData('msic', 'MSIC2008_2025.csv');
  };

  function loadData(type, file) {
    Papa.parse(file, {
      download: true,
      header: true,
      skipEmptyLines: true,
      complete: (res) => {
        datasets[type] = res.data;
        if (type === activeTab) enableSearch();
      }
    });
  }

  function enableSearch() {
    input.disabled = false;
    input.placeholder = activeTab === 'msbr' ? "Cari Nama / No. Siri..." : "Cari Kod / Deskripsi...";
    statusTxt.textContent = "Data Sedia";
    loadIcon.style.display = 'none';
    resultsEl.innerHTML = `<div style="padding:40px; text-align:center; color:var(--text-muted);">Sila masukkan sekurang-kurangnya 2 aksara.</div>`;
  }

  function switchTab(tab) {
    if (activeTab === tab) return;
    activeTab = tab;
    offset = 0;
    input.value = "";
    
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-'+tab).classList.add('active');
    
    // Reset View
    resultsEl.innerHTML = `<div style="padding:40px; text-align:center; color:var(--text-muted);">Masukkan carian untuk ${tab.toUpperCase()}</div>`;
    countTxt.textContent = "0 rekod";
    updatePager(0);
    enableSearch();
  }

  input.addEventListener('input', () => {
    const q = input.value.trim().toLowerCase();
    offset = 0;
    
    if (q.length < 2) {
      filtered = [];
      render();
      return;
    }

    const data = datasets[activeTab];
    if (!data) return;

    // Fast Filter
    filtered = data.filter(row => {
      return Object.values(row).some(v => String(v).toLowerCase().includes(q));
    });

    render();
  });

  function render() {
    const total = filtered.length;
    countTxt.textContent = `${total} rekod`;
    
    if (total === 0) {
      resultsEl.innerHTML = `<div style="padding:40px; text-align:center;">Tiada hasil dijumpai.</div>`;
      updatePager(0);
      return;
    }

    const chunk = filtered.slice(offset, offset + limit);
    let html = '';

    chunk.forEach(row => {
      html += `<div class="data-item">`;
      if (activeTab === 'msbr') {
        html += `<span class="item-title">${row['Nama Pendaftaran'] || 'TIADA NAMA'}</span>`;
        html += `<div class="item-row"><span class="item-label">No. Siri</span><span class="item-val">${row['No. Siri']}</span></div>`;
        html += `<div class="item-row"><span class="item-label">Perniagaan</span><span class="item-val">${row['Nama Perniagaan'] || '-'}</span></div>`;
        html += `<div class="item-row"><span class="item-label">Daerah</span><span class="item-val">${row['Daerah Pentadbiran Tahunan'] || '-'}</span></div>`;
      } else {
        html += `<span class="item-title">${row['MSIC 2025'] || row['MSIC 2008']}</span>`;
        html += `<div class="item-row"><span class="item-label">Malay</span><span class="item-val">${row['MALAY DESCRIPTION FOR MSIC 2025'] || '-'}</span></div>`;
        html += `<div class="item-row"><span class="item-label">English</span><span class="item-val">${row['ENGLISH DESCRIPTION FOR MSIC 2025'] || '-'}</span></div>`;
      }
      html += `</div>`;
    });

    resultsEl.innerHTML = html;
    resultsEl.scrollTop = 0;
    updatePager(total);
  }

  function updatePager(total) {
    document.getElementById('prevBtn').disabled = offset === 0;
    document.getElementById('nextBtn').disabled = (offset + limit) >= total;
    document.getElementById('pageTxt').textContent = `Halaman ${Math.floor(offset/limit) + 1}`;
  }

  document.getElementById('prevBtn').onclick = () => { offset -= limit; render(); };
  document.getElementById('nextBtn').onclick = () => { offset += limit; render(); };
</script>

</body>
</html>
